[platformio]
default_envs = watchy_v3

; Legacy V1/V2 target — kept so prior watchysim builds remain reproducible.
; Do not flash to V3 hardware (wrong chip and pin map).
[env:watchy]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    zinggjm/GxEPD2@^1.5.0
    adafruit/Adafruit GFX Library@^1.11.9
    sqfmi/Watchy@^1.4.0
monitor_speed = 115200

; Watchy V3 — ESP32-S3, SSD1681, real-device target.
; The S3 board choice is what makes the Arduino core define
; ARDUINO_ESP32S3_DEV, which is the actual selector inside the Watchy
; library's config.h. -DARDUINO_WATCHY_V30 documents intent.
; min_spiffs.csv is required because sqfmi/Watchy pulls in WiFiManager +
; BLE + OTA, overflowing the default app partition.
[env:watchy_v3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.partitions = min_spiffs.csv
build_flags =
    -DARDUINO_WATCHY_V30
    -DBOARD_HAS_PSRAM
lib_deps =
    sqfmi/Watchy@^1.4.0
monitor_speed = 115200

; Wokwi-only target. Drops sqfmi/Watchy (and therefore GxEPD2/SSD1681) and
; renders straight through Adafruit_GFX onto a stock ILI9341 240×320 LCD.
; Adafruit_GFX produces identical pixels regardless of the underlying
; driver, so a render that looks correct on the LCD will look the same
; on the real Watchy V3 200×200 e-paper. The 200×200 watch canvas is
; blitted to the LCD at offset (20, 60).
[env:watchy_v3_sim]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_flags =
    -DWOKWI_SIM
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit ILI9341@^1.6.1
    adafruit/Adafruit BusIO@^1.16.1
monitor_speed = 115200
